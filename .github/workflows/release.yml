name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package build artifacts
        run: |
          cd dist
          zip -r ../siyuan-query-mcp-${GITHUB_REF#refs/tags/}.zip .
          cd ..

      - name: Generate release notes
        id: release_notes
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}

          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" --no-merges | head -20)
          else
            COMMITS=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          fi

          cat > release_notes.md << EOF
          ## 🚀 SiYuan Query MCP ${VERSION}

          ### Changes
          ${COMMITS}

          ### Installation

          \`\`\`json
          {
            "mcpServers": {
              "siyuan": {
                "command": "npx",
                "args": ["-y", "siyuan-query-mcp@latest"],
                "env": {
                  "SIYUAN_API_TOKEN": "your-api-token"
                }
              }
            }
          }
          \`\`\`

          ### Links
          - [Documentation](https://github.com/${GITHUB_REPOSITORY}/blob/main/README.md)
          - [Changelog](https://github.com/${GITHUB_REPOSITORY}/releases)
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          body_path: release_notes.md
          files: |
            siyuan-query-mcp-${{ github.ref_name }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
